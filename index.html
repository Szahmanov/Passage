<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Passage by StaGove — Immigration Case Manager</title>
<meta name="description" content="An autonomous immigration pathway and case-manager agent. Find realistic visa, residency and citizenship routes for your situation, ground checklists in official sources, and track every step." />
<meta name="theme-color" content="#0C2138" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ================================================================= TOP BAR -->
<header class="topbar">
  <div class="brand" id="brand-home" title="Passage home">
    <svg viewBox="0 0 40 40" fill="none" aria-hidden="true">
      <rect width="40" height="40" rx="9" fill="#0C2138"/>
      <circle cx="20" cy="20" r="13.5" stroke="#C2974B" stroke-width="2"/>
      <circle cx="20" cy="20" r="11" stroke="#C2974B" stroke-width="1"/>
      <path d="M13.5 26.5 L25 14" stroke="#F0EEE6" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="0.3 3.3"/>
      <circle cx="13.5" cy="26.5" r="2.1" fill="#F0EEE6"/>
      <path d="M25 14 l-4.2 .5 2 3.7Z" fill="#C2974B"/>
    </svg>
    <div class="wm"><b>Passage</b><span>BY STAGOVE</span></div>
  </div>
  <div class="topbar-actions">
    <button id="nav-new" class="btn btn-primary btn-sm">+ New case</button>
    <button id="nav-cases" class="btn btn-ghost on-dark btn-sm">Cases</button>
    <button id="install-btn" class="icon-btn hidden" title="Install app" aria-label="Install Passage">⤓</button>
    <button id="nav-info" class="icon-btn" title="About &amp; privacy" aria-label="About and privacy">ⓘ</button>
  </div>
</header>

<!-- ================================================================= APP MOUNT -->
<main id="app" class="wrap"></main>

<!-- ================================================================= FOOTER -->
<footer class="foot">
  <div>Passage by StaGove · an autonomous immigration case manager · <span class="mono">v1</span></div>
  <div class="links">
    <a id="foot-autonomy">Why it's an agent</a>
    <a id="foot-privacy">Privacy</a>
    <a id="foot-disclaimer">Not legal advice</a>
  </div>
</footer>

<div id="toast" class="toast" role="status" aria-live="polite"></div>
<div id="modal-root"></div>

<!-- data layer first (defines window.PATHWAY_RULES), then the agent app -->
<script src="data/pathway-rules.js"></script>
<script src="app.js"></script>
</body>
</html>
